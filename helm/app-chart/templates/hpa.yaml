apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  # Uses the appName value from values.yaml
  name: {{ .Values.appName }}-hpa

spec:
  # Points to the deployment this HPA manages
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.appName }}

  # Min and max replicas pulled from values.yaml
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale up when CPU exceeds this threshold
          averageUtilization: {{ .Values.hpa.targetCPUUtilization }}
