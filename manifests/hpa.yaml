apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  # Name of the HPA
  name: stephen-app-hpa

spec:
  # Points to the deployment this HPA manages
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stephen-app

  # Minimum and maximum number of pods allowed
  minReplicas: 2
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Scale up when average CPU across pods exceeds 70%
          averageUtilization: 70
