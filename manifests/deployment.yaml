apiVersion: apps/v1
kind: Deployment
metadata:
  # Name of the deployment
  name: stephen-app
  labels:
    app: stephen-app

spec:
  # Start with 2 replicas — HPA will scale this up or down
  replicas: 2

  # Tells Kubernetes which pods this deployment manages
  selector:
    matchLabels:
      app: stephen-app

  template:
    metadata:
      labels:
        app: stephen-app

    spec:
      containers:
        - name: stephen-app
          image: nginx:latest
          ports:
            - containerPort: 80

          # Resource limits — prevents any single pod from consuming too much
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"

          # Readiness probe — Kubernetes won't send traffic until this passes
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          # Liveness probe — Kubernetes restarts the pod if this fails
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
